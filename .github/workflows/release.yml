name: release

# Builds the shadow binary for Linux/macOS/Windows and attaches them to a GitHub Release on a v* tag.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.0.1)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.osname }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  osname: Linux,   ext: "" }
          - { os: macos-latest,   osname: macOS,   ext: "" }
          - { os: windows-latest, osname: Windows, ext: ".exe" }
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - name: Linux deps (X11 / input / capture)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libx11-dev libxi-dev libxtst-dev libxrandr-dev             libxss-dev libxcb1-dev libxcb-randr0-dev libxcb-shm0-dev libxcb-xfixes0-dev             libxdo-dev libdbus-1-dev libssl-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/shadow
      - name: Build
        run: cargo build --release --manifest-path apps/shadow/Cargo.toml
      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          cp "apps/shadow/target/release/shadow${{ matrix.ext }}" "dist/shadow-${{ matrix.osname }}-x64${{ matrix.ext }}"
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: dist/*
          fail_on_unmatched_files: true
